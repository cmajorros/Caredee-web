<svg width="1000" height="320" viewBox="0 0 340 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .loop {
        fill: none;
        stroke: #1F7A6C;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .node {
        fill: #2CA6A4;
      }
      .brand {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-size: 36px;
        fill: #2E2E2E;
        letter-spacing: 0.5px;
      }
      .slogan {
        font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
        font-size: 16px;
        fill: #6B6B6B;
        letter-spacing: 0.2px;
      }
    </style>
  </defs>

  <!-- ICON -->
  <g transform="translate(10,15) scale(0.85)">
    <path class="loop" d="
        M 30 50
        A 20 20 0 1 1 50 30
        A 20 20 0 1 1 70 50
        A 22 22 0 1 1 30 50
      "></path>
    <circle class="node" cx="68" cy="42" r="2.5"></circle>
    <circle class="node" cx="50" cy="70" r="2.5"></circle>
  </g>

  <!-- BRAND NAME -->
  <text x="120" y="55" class="brand">Caredee</text>

  <!-- SLOGAN -->
  <text x="120" y="78" class="slogan">Smarter Care, Better Lives</text>

</svg>