<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .loop {
        fill: none;
        stroke: #1F7A6C;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .node {
        fill: #2CA6A4;
      }
    </style>
  </defs>

  <!-- Smart Heart Loop Path -->
  <path class="loop" d="
      M 30 50
      A 20 20 0 1 1 50 30
      A 20 20 0 1 1 70 50
      A 22 22 0 1 1 30 50
    "></path>

  <!-- AI Nodes -->
  <circle class="node" cx="68" cy="42" r="2.5"></circle>
  <circle class="node" cx="50" cy="70" r="2.5"></circle>

</svg>